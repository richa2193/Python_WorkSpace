<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Profile</title>

    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen bg-gradient-to-r from-indigo-500 via-purple-500 to-pink-500 flex items-center justify-center p-5">

    <div class="bg-white w-full max-w-md rounded-3xl shadow-2xl p-8">

        <h1 class="text-4xl font-bold text-center text-indigo-600 mb-8">
            Create Profile
        </h1>

        <form method="POST" class="space-y-5">

            {% csrf_token %}

            <!-- Full Name -->
            <div>
                <label class="block mb-2 font-semibold text-gray-700">
                    Full Name
                </label>

                <input
                    type="text"
                    name="fullname"
                    placeholder="Enter your name"
                    class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500"
                    required>
            </div>

            <!-- Email -->
            <div>
                <label class="block mb-2 font-semibold text-gray-700">
                    Email
                </label>

                <input
                    type="email"
                    name="email"
                    placeholder="Enter your email"
                    class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500"
                    required>
            </div>

            <!-- Age -->
            <div>
                <label class="block mb-2 font-semibold text-gray-700">
                    Age
                </label>

                <input
                    type="number"
                    name="age"
                    placeholder="Enter your age"
                    class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500"
                    required>
            </div>

            <!-- Bio -->
            <div>
                <label class="block mb-2 font-semibold text-gray-700">
                    Bio
                </label>

                <textarea
                    name="bio"
                    rows="4"
                    placeholder="Write something..."
                    class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500"
                    required></textarea>
            </div>

            <!-- Button -->
            <button
                type="submit"
                class="w-full bg-indigo-600 hover:bg-indigo-700 text-white py-3 rounded-xl text-lg font-semibold transition duration-300">

                Save Profile

            </button>

        </form>

        <!-- Link -->
        <div class="text-center mt-6">

            <a href="/"
                class="text-indigo-600 font-semibold hover:underline">

                View Profiles

            </a>

        </div>

    </div>

</body>
</html>
