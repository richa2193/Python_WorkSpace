<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Profile</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
        }
    </style>
</head>

<body class="bg-gradient-to-r from-indigo-500 via-purple-500 to-pink-500 min-h-screen flex items-center justify-center p-5">

    <div class="bg-white w-full max-w-md rounded-3xl shadow-2xl p-8">

        <!-- Heading -->
        <div class="text-center mb-8">
            <h1 class="text-4xl font-bold text-gray-800">
                Create Profile
            </h1>

            <p class="text-gray-500 mt-2">
                Enter your details below
            </p>
        </div>

        <!-- Form -->
        <form method="POST" class="space-y-5">

            {% csrf_token %}

            <!-- Username -->
            <div>
                <label class="block text-gray-700 font-semibold mb-2">
                    Username
                </label>

                <input type="text"
                    name="username"
                    placeholder="Enter username"
                    class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:outline-none focus:ring-4 focus:ring-indigo-300 transition duration-300">
            </div>

            <!-- Age -->
            <div>
                <label class="block text-gray-700 font-semibold mb-2">
                    Age
                </label>

                <input type="number"
                    name="age"
                    placeholder="Enter age"
                    class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:outline-none focus:ring-4 focus:ring-pink-300 transition duration-300">
            </div>

            <!-- Public Checkbox -->
            <div class="flex items-center gap-3">

                <input type="checkbox"
                    name="is_public"
                    class="w-5 h-5 text-indigo-600 rounded">

                <label class="text-gray-700 font-medium">
                    Make Profile Public
                </label>

            </div>

            <!-- Error Messages -->
            {% if form.errors %}

            <div class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded-xl">

                {% for field in form %}
                    {% for error in field.errors %}
                        <p>{{ error }}</p>
                    {% endfor %}
                {% endfor %}

            </div>

            {% endif %}

            <!-- Submit Button -->
            <button type="submit"
                class="w-full bg-gradient-to-r from-indigo-500 to-pink-500 text-white py-3 rounded-xl font-semibold text-lg hover:scale-105 transition duration-300 shadow-lg">

                Save Profile

            </button>

        </form>

        <!-- Bottom Link -->
        <div class="text-center mt-6">

            <a href="/profiles/"
                class="text-indigo-600 font-semibold hover:text-pink-500 transition duration-300">

                View All Profiles →

            </a>

        </div>

    </div>

</body>

</html>
