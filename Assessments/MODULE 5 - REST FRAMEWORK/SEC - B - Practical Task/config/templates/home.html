<!DOCTYPE html>
<html>
<head>
    <title>Doctor Finder</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

<!-- Header -->
<div class="bg-blue-600 p-6 text-white text-center text-3xl font-bold">
    Doctor Finder System
</div>

<!-- Grid -->
<div class="max-w-6xl mx-auto p-6 grid md:grid-cols-3 gap-6">

    {% for doctor in doctors %}

    <div class="bg-white shadow-lg rounded-xl p-5 hover:scale-105 transition">

        <h2 class="text-xl font-bold text-gray-800">
            {{ doctor.name }}
        </h2>

        <p class="text-gray-600 mt-2">
            🩺 {{ doctor.specialization }}
        </p>

        <p class="text-blue-500 mt-1">
            📍 {{ doctor.city }}
        </p>

    </div>

    {% endfor %}

</div>

</body>
</html>
