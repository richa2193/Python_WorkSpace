<!DOCTYPE html>
<html>

<head>

    <title>Doctor Finder</title>

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-cyan-100">

    <nav class="bg-blue-900 p-5 flex justify-between items-center">

        <div class="flex items-center">

            <i class="fa-solid fa-stethoscope text-cyan-400 text-4xl mr-3"></i>

            <h1 class="text-white text-4xl font-bold">
                DoctorFinder
            </h1>

        </div>

        <div class="space-x-8 text-white text-xl">

            <a href="/">Home</a>

            <a href="/profile/">Profile</a>

            <a href="/about/">About Us</a>

            <a href="/contact/">Contact</a>

        </div>

    </nav>

    <!-- HOME SECTION -->

    <div class="flex justify-center items-center mt-20">

        <div class="bg-white w-[1200px] rounded-3xl shadow-2xl p-14 flex justify-between">

            <!-- LEFT -->

            <div class="w-1/2">

                <span class="bg-cyan-100 text-cyan-700 px-5 py-2 rounded-full">
                    Trusted Healthcare Platform
                </span>

                <h1 class="text-7xl font-bold mt-8">
                    Welcome to
                    <span class="text-cyan-500">
                        Doctor Finder
                    </span>
                </h1>

                <p class="text-3xl text-gray-600 mt-8">
                    Find trusted doctors and manage patient appointments with modern healthcare technology.
                </p>

                <div class="mt-10 flex gap-6">

                    <a href="/doctor/">
                        <button
                            class="bg-gradient-to-r from-cyan-400 to-blue-600 text-white px-8 py-4 rounded-2xl text-2xl shadow-lg">
                            Doctor Panel
                        </button>
                    </a>

                    <a href="/patient/">
                        <button class="border border-gray-400 px-8 py-4 rounded-2xl text-2xl">
                            Patient Panel
                        </button>
                    </a>

                </div>

            </div>

            <!-- RIGHT -->

            <div class="border-4 border-cyan-400 rounded-3xl p-14 text-center w-[450px]">

                <i class="fa-solid fa-stethoscope text-7xl text-purple-600"></i>

                <h1 class="text-5xl font-bold mt-8">
                    Smart Healthcare
                </h1>

                <p class="text-2xl text-gray-600 mt-5">
                    Easy doctor search and patient management.
                </p>

                <div class="flex justify-between mt-10">

                    <div class="bg-cyan-50 p-8 rounded-2xl w-[150px]">

                        <h1 class="text-5xl font-bold text-cyan-600">
                            500+
                        </h1>

                        <p class="text-2xl mt-3">
                            Doctors
                        </p>

                    </div>

                    <div class="bg-blue-50 p-8 rounded-2xl w-[150px]">

                        <h1 class="text-5xl font-bold text-blue-600">
                            24/7
                        </h1>

                        <p class="text-2xl mt-3">
                            Support
                        </p>

                    </div>

                </div>

            </div>

        </div>

    </div>

</body>

</html>
