<!DOCTYPE html>
<html>

<head>

    <title>Doctor Records</title>

</head>

<body>

    <h1>Doctor Records</h1>

    <a href="/doctor/add/">

        Add Doctor

    </a>

    <hr>

    {% for d in doctors %}

        <h2>{{ d.name }}</h2>

        <p>Specialization: {{ d.specialization }}</p>

        <p>Email: {{ d.email }}</p>

        <p>Phone: {{ d.phone }}</p>

        <p>Experience: {{ d.experience }} Years</p>

        <a href="/doctor/update/{{ d.id }}/">

            Update

        </a>

        |

        <a href="/doctor/delete/{{ d.id }}/">

            Delete

        </a>

        <hr>

    {% endfor %}

</body>

</html>
