<!DOCTYPE html>
<html>

<head>

    <title>Contact</title>

    <!-- GOOGLE FONT -->

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- TAILWIND CSS -->

    <script src="https://cdn.tailwindcss.com"></script>

    <!-- FONT AWESOME -->

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>

<body class="bg-cyan-100" style="font-family: Poppins;">

    <!-- NAVBAR -->

    <nav class="bg-blue-900 p-5 flex justify-between items-center">

        <div class="flex items-center">

            <i class="fa-solid fa-stethoscope text-cyan-400 text-4xl mr-3"></i>

            <h1 class="text-white text-4xl font-bold">
                DoctorFinder
            </h1>

        </div>

        <div class="space-x-8 text-white text-xl">

            <a href="/" class="hover:text-cyan-300">Home</a>

            <a href="/profile/" class="hover:text-cyan-300">Profile</a>

            <a href="/about/" class="hover:text-cyan-300">About Us</a>

            <a href="/contact/" class="hover:text-cyan-300">Contact</a>

        </div>

    </nav>

    <!-- CONTACT FORM -->

    <div class="flex justify-center mt-20">

        <div class="bg-white p-16 rounded-3xl shadow-2xl w-[600px]">

            <h1 class="text-5xl font-bold text-center">
                Contact Us
            </h1>

            <input type="text"
                placeholder="Enter Name"
                class="border w-full p-4 rounded-xl mt-10 text-xl">

            <input type="email"
                placeholder="Enter Email"
                class="border w-full p-4 rounded-xl mt-5 text-xl">

            <textarea
                placeholder="Enter Message"
                class="border w-full p-4 rounded-xl mt-5 text-xl h-[150px]"></textarea>

            <button
                class="bg-blue-600 text-white w-full p-4 rounded-xl mt-5 text-2xl hover:bg-blue-800">
                Send Message
            </button>

        </div>

    </div>

</body>

</html>
