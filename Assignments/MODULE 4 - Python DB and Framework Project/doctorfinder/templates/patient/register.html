<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Doctor Finder</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

</head>

<body class="bg-gradient-to-r from-slate-100 to-blue-50 min-h-screen flex flex-col">

    <!-- Navbar -->
    <nav class="bg-[#06245c] text-white px-10 py-4 flex justify-between items-center shadow-lg">

        <div class="flex items-center gap-3">

            <div class="text-4xl text-cyan-400">
                <i class="fa-solid fa-heart-pulse"></i>
            </div>

            <h1 class="text-3xl font-bold">
                Doctor<span class="text-cyan-400">Finder</span>
            </h1>

        </div>

        <div class="flex gap-10 text-lg font-semibold items-center">

            <a href="#" class="hover:text-cyan-300 duration-300">Home</a>

            <a href="#" class="hover:text-cyan-300 duration-300">
                Find Doctors
            </a>

            <a href="#" class="hover:text-cyan-300 duration-300">
                About Us
            </a>

            <a href="#" class="hover:text-cyan-300 duration-300">
                Contact
            </a>

            <a href="/patient/login/" class="border border-white px-5 py-2 rounded-lg hover:bg-white hover:text-[#06245c] duration-300 inline-block">
                <i class="fa-solid fa-user"></i> Login
            </a>

        </div>

    </nav>


    <!-- Main Section -->
    <div class="flex-grow flex flex-col items-center justify-center px-5 py-10">

        <!-- Heading -->
        <h1 class="text-6xl font-bold text-[#06245c] text-center">
            Welcome to
            <span class="text-cyan-500">DoctorFinder</span>
        </h1>

        <p class="text-3xl text-gray-500 mt-5">
            Your Health, Our Priority
        </p>

        <div class="flex items-center gap-4 mt-5">

            <div class="w-24 h-1 bg-cyan-500 rounded-full"></div>

            <i class="fa-solid fa-heart text-cyan-500 text-2xl"></i>

            <div class="w-24 h-1 bg-cyan-500 rounded-full"></div>

        </div>


        <!-- Registration Card -->
        <div class="bg-white mt-10 rounded-3xl shadow-2xl w-full max-w-3xl p-12">

            <!-- Icon -->
            <div class="flex justify-center">

                <div
                    class="bg-cyan-500 text-white w-20 h-20 rounded-full flex items-center justify-center text-4xl shadow-lg">
                    <i class="fa-solid fa-user"></i>
                </div>

            </div>


            <!-- Form Title -->
            <h2 class="text-5xl font-bold text-center text-[#06245c] mt-6">
                Patient Registration Form
            </h2>

            <div class="w-24 h-1 bg-cyan-500 mx-auto rounded-full mt-4 mb-10"></div>


            <!-- Form -->
            <form method="POST" class="space-y-6" onsubmit="return validateForm()">

                {% csrf_token %}

                <!-- Full Name -->

                <div class="flex items-center border border-gray-300 rounded-xl px-5 py-4">

                    <i class="fa-regular fa-user text-cyan-500 text-2xl"></i>

                    <input type="text" id="fullname" name="full_name" placeholder="Enter Full Name"
                        class="w-full outline-none ml-4 text-lg">

                </div>

                <!-- Email -->

                <div class="flex items-center border border-gray-300 rounded-xl px-5 py-4">

                    <i class="fa-regular fa-envelope text-cyan-500 text-2xl"></i>

                    <input type="email" id="email" name="email" placeholder="Enter Email"
                        class="w-full outline-none ml-4 text-lg">

                </div>

                <!-- Mobile -->

                <div class="flex items-center border border-gray-300 rounded-xl px-5 py-4">

                    <i class="fa-solid fa-phone text-cyan-500 text-2xl"></i>

                    <input type="text" id="mobile" name="mobile" placeholder="Enter Mobile Number"
                        class="w-full outline-none ml-4 text-lg">

                </div>

                <!-- Birthdate -->

                <div class="flex items-center border border-gray-300 rounded-xl px-5 py-4">

                    <i class="fa-solid fa-calendar text-cyan-500 text-2xl"></i>

                    <input type="date" name="birthdate" class="w-full outline-none ml-4 text-lg">

                </div>

                <!-- Age -->

                <div class="flex items-center border border-gray-300 rounded-xl px-5 py-4">

                    <i class="fa-regular fa-calendar text-cyan-500 text-2xl"></i>

                    <input type="number" name="age" placeholder="Enter Age" class="w-full outline-none ml-4 text-lg">

                </div>

                <!-- Password -->

                <div class="flex items-center border border-gray-300 rounded-xl px-5 py-4">

                    <i class="fa-solid fa-lock text-cyan-500 text-2xl"></i>

                    <input type="password" name="password" placeholder="Enter Password"
                        class="w-full outline-none ml-4 text-lg">

                </div>

                <button type="submit"
                    class="w-full bg-gradient-to-r from-cyan-500 to-teal-500 text-white py-4 rounded-xl text-2xl font-bold">

                    Register

                </button>

            </form>


            <!-- Login -->
            <p class="text-center text-gray-500 mt-8 text-lg">

                Already have an account?

                <a href="/patient/login/" class="text-cyan-600 font-bold hover:underline">
                    Login here
                </a>

            </p>

        </div>

    </div>


    <!-- Footer -->
    <footer class="bg-[#06245c] text-white text-center py-5 text-lg">

        © 2026 DoctorFinder. All rights reserved.

    </footer>
    <script>

        function validateForm() {

            let email = document.getElementById("email").value;

            let mobile = document.getElementById("mobile").value;

            let emailPattern = /^[^ ]+@[^ ]+\.[a-z]{2,3}$/;

            let mobilePattern = /^[0-9]{10}$/;

            if (!email.match(emailPattern)) {

                alert("Invalid Email");

                return false;
            }

            if (!mobile.match(mobilePattern)) {

                alert("Mobile Number Must Be 10 Digits");

                return false;
            }

            return true;
        }

    </script>

</body>

</html>
