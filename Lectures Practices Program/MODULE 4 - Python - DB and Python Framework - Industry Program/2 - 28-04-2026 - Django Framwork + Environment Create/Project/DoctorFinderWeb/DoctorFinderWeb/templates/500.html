{% extends 'base.html' %}

{% block title %}Server Error | Doctor Finder{% endblock %}

{% block content %}
<div class="min-h-[70vh] flex flex-col justify-center items-center px-4 sm:px-6 lg:px-8 bg-gray-50">
    <div class="text-center max-w-lg">
        <div class="w-40 h-40 mx-auto mb-8 bg-red-50 text-red-500 rounded-full flex items-center justify-center shadow-inner relative overflow-hidden">
            <i class="fa-solid fa-truck-medical text-6xl relative z-10"></i>
            <div class="absolute inset-0 bg-red-500 opacity-10 animate-pulse"></div>
        </div>
        <h1 class="text-9xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-red-500 to-orange-400 mb-4">500</h1>
        <h2 class="text-3xl font-bold text-gray-900 mb-4">Internal Server Error</h2>
        <p class="text-lg text-gray-500 mb-8">We are experiencing some technical difficulties. Our emergency tech team is working on it. Please try again later.</p>
        <a href="{% url 'home' %}" class="inline-flex items-center justify-center px-8 py-4 border border-transparent text-base font-medium rounded-full text-white bg-primary hover:bg-blue-700 shadow-md transition duration-300 hover:-translate-y-1">
            <i class="fa-solid fa-rotate-right mr-2"></i> Try Again
        </a>
    </div>
</div>
{% endblock %}
