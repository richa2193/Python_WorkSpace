{% extends 'base.html' %}

{% block title %}Page Not Found | Doctor Finder{% endblock %}

{% block content %}
<div class="min-h-[70vh] flex flex-col justify-center items-center px-4 sm:px-6 lg:px-8 bg-gray-50">
    <div class="text-center max-w-lg">
        <div class="w-40 h-40 mx-auto mb-8 bg-blue-50 text-primary rounded-full flex items-center justify-center shadow-inner relative overflow-hidden">
            <i class="fa-solid fa-notes-medical text-6xl relative z-10"></i>
            <div class="absolute inset-0 bg-primary opacity-10 animate-pulse"></div>
        </div>
        <h1 class="text-9xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-primary to-secondary mb-4">404</h1>
        <h2 class="text-3xl font-bold text-gray-900 mb-4">Page Not Found</h2>
        <p class="text-lg text-gray-500 mb-8">Oops! The page you are looking for might have been removed, had its name changed, or is temporarily unavailable.</p>
        <a href="{% url 'home' %}" class="inline-flex items-center justify-center px-8 py-4 border border-transparent text-base font-medium rounded-full text-white bg-primary hover:bg-blue-700 shadow-md transition duration-300 hover:-translate-y-1">
            <i class="fa-solid fa-arrow-left mr-2"></i> Back to Home
        </a>
    </div>
</div>
{% endblock %}
