<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to Database Connectivity</title>
</head>
<body style="background-color:lavender;">
    <h1 style="text-align: center; color: darkorchid; font-family: 'Times New Roman', Times, serif;">Welcome To CRUD Operations</h1>
    <hr>

    <form method="post">
        {%csrf_token%}
        <input type="name" value={{stid.name}} name="name" placeholder="Name"><br><br>
        <input type="email" value={{stid.email}} name="email" placeholder="Email"><br><br>
        <input type="date" value={{stid.dob}} name="dob" placeholder="dob"><br><br>
        <input type="number" value={{stid.mobile}} name="mobile" placeholder="Mobile"><br><br>
        <textarea name="address" id="" placeholder="Address">{{stid.addresss}}</textarea><br><br>
        <input type="submit">
    </form>
    <hr>
    <a href="/showdata">ShowData</a>
</body>
</html>
