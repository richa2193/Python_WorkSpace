<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Showdata</title>
</head>
<body style="background-color: lavender;">
    <h1 style="text-align: center; color:darkorchid; font-family: 'Times New Roman', Times, serif;">Welcome To ShowData</h1>
    <hr>

    <table border="1" cellpadding="15" cellspacing="0" width="80%" align="center" height="50%">
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>email</th>
            <th>DOB</th>
            <th>Mobile</th>
            <th>Address</th>
            <th>Action</th>
        </tr>

        {% for i in stdata %}
        <tr>
            <td>{{i.id}}</td>
            <td>{{i.name}}</td>
            <td>{{i.email}}</td>
            <td>{{i.dob}}</td>
            <td>{{i.mobile}}</td>
            <td>{{i.address}}</td>
            <td>
                <a href="/updatedata/{{i.id}}">Update</a>
                <a href="/deletedata/{{i.id}}">Delete</a>
            </td>
        </tr>
        {%endfor%}
    </table>


</body>
</html>
