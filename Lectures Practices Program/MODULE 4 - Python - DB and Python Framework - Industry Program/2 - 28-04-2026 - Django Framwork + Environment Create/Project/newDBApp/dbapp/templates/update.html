<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Update Data</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-black via-gray-900 to-black min-h-screen flex items-center justify-center px-4">

    <div class="w-full max-w-2xl bg-black/50 backdrop-blur-lg border border-gray-700 rounded-3xl shadow-2xl p-8">

        <h2 class="text-4xl font-bold text-center text-white mb-8">
            Update Data
        </h2>

        <form method="POST">

            {% csrf_token %}

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

                <!-- Name -->
                <div>
                    <label class="block text-gray-300 mb-2">Name</label>

                    <input type="text" name="name" value="{{ stid.name }}"
                        class="w-full px-4 py-3 rounded-xl bg-gray-900 text-white border border-gray-600 focus:outline-none focus:ring-2 focus:ring-white">
                </div>

                <!-- Email -->
                <div>
                    <label class="block text-gray-300 mb-2">Email</label>

                    <input type="email" name="email" value="{{ stid.email }}"
                        class="w-full px-4 py-3 rounded-xl bg-gray-900 text-white border border-gray-600 focus:outline-none focus:ring-2 focus:ring-white">
                </div>

                <!-- Mobile -->
                <div>
                    <label class="block text-gray-300 mb-2">Mobile</label>

                    <input type="text" name="mobile" value="{{ stid.mobile }}"
                        class="w-full px-4 py-3 rounded-xl bg-gray-900 text-white border border-gray-600 focus:outline-none focus:ring-2 focus:ring-white">
                </div>

                <!-- DOB -->
                <div>
                    <label class="block text-gray-300 mb-2">DOB</label>

                    <input type="date" name="dob" value="{{ stid.dob|date:'Y-m-d' }}"
                        class="w-full px-4 py-3 rounded-xl bg-gray-900 text-white border border-gray-600 focus:outline-none focus:ring-2 focus:ring-white">
                </div>

            </div>

            <!-- Button -->
            <div class="mt-8 text-center">

                <button type="submit"
                    class="bg-white text-black px-8 py-3 rounded-xl font-bold hover:bg-gray-300 transition duration-300">
                    Update Data
                </button>

            </div>

        </form>

    </div>

</body>

</html>
