<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome To Database Connectivity </title>
</head>
<body style="background-color: aliceblue;">
    <h1 style="text-align: center; color: blueviolet; font-family: 'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif;">Welcome to DB Connectivity </h1>
    <hr>   

    <form method="post">
        {%csrf_token%}
        <input type="text" name="name" placeholder="Name"><br><br>

    </form>

    <a href="/showdata">ShowData</a>

</html>
