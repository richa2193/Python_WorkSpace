<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShowData</title>
</head>
<body style="background-color: lightcyan;">
    <h1 style="text-align: center; color: blueviolet; font-family: 'Times New Roman', Times, serif;">Welcome to ShowData</h1>
    <hr>
    <!-- {{stdata}} -->

    <!-- {% for i in stdata %}
    {{i.id}}
    {{i.name}}
    {{i.email}}
    {% endfor %}  -->

    <table border="1" cellpadding="10" cellspacing="0" width="70%" align="center">
        <tr>
            <th>ID</th>
            <th>name</th>
            <th>email</th>
            <th>DOB</th>
            <th>Mobile</th>
            <th>Address</th>
            <th>Action</th>
    
        </tr>
        {% for i in stdata %}
        <tr>
            <td>{{i.id}}</td>
            <td>{{i.name}}</td>
            <td>{{i.email}}</td>
            <td>{{i.dob}}</td>
            <td>{{i.mobile}}</td>
            <td>{{i.address}}</td>
            <td><a href="/updatedata/{{i.id}}">Update</a>
                <a href="/deletedata/{{i.id}}">Delete</a>
            </td>
        </tr>
        {% endfor%}
    </table>

</body>
</html>
