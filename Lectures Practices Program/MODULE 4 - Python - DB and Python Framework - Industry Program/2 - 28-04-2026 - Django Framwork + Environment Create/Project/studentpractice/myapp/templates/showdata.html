<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Of Students</title>
</head>
<body style="background-color:lavenderblush">
    <h1 style="text-align: center; color: darkred; font-family: 'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif;">Student Management System</h1>
    <hr>   

    <table border="3" cellpadding="17" cellspacing="0" width="80%" align="center">
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Course</th>
            <th>DOB</th>
            <th>Mobile</th>
            <th>City</th>
            <th>Action</th>
        </tr>
        {% for i in stdata %}
        <tr>
            <td>{{i.id}}</td>
            <td>{{i.name}}</td>
            <td>{{i.course}}</td>
            <td>{{i.dob}}</td>
            <td>{{i.mobile}}</td>
            <td>{{i.city}}</td>
            <td>
                <a href="/updatedata/{{i.id}}">Update</a>
                <a href="/deletedata/{{i.id}}">Delete</a>
            </td>
        </tr>
        {% endfor %}
    </table>
    <hr>
</body>
</html>
